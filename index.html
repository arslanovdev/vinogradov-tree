<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>Древо семьи Виноградовых</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Spectral:ital,wght@0,400;0,500;0,600;1,500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box}
html,body{margin:0;padding:0;height:100%;background:#f4f0e9}
body{font-family:Manrope,system-ui,sans-serif}
@keyframes cardIn{from{opacity:0;transform:translateY(16px) scale(.95)}to{opacity:1;transform:none}}
@keyframes drawerIn{from{transform:translateX(46px);opacity:0}to{transform:none;opacity:1}}
@keyframes sheetIn{from{transform:translateY(60px);opacity:0}to{transform:none;opacity:1}}
@keyframes backdropIn{from{opacity:0}to{opacity:1}}
@keyframes floaty{0%{transform:translate(0,0)}50%{transform:translate(26px,-30px)}100%{transform:translate(0,0)}}
@keyframes hdrIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:none}}
.dt-scroll::-webkit-scrollbar{width:9px}
.dt-scroll::-webkit-scrollbar-thumb{background:#dcd3c4;border-radius:9px;border:2px solid #fffdf9}
.dt-scroll::-webkit-scrollbar-track{background:transparent}
.node-card{background:#fffdf9;border:1px solid #ece5da;border-left:5px solid var(--accent);border-radius:18px;padding:12px 14px;display:flex;gap:11px;align-items:center;box-shadow:0 6px 18px rgba(70,55,40,.07);transition:transform .25s ease,box-shadow .25s ease,border-color .25s ease;animation:cardIn .55s cubic-bezier(.2,.7,.2,1) both;animation-delay:var(--delay)}
.node-card:hover{transform:translateY(-4px);box-shadow:0 16px 34px rgba(70,55,40,.15);border-color:var(--accent)}
.ctl-btn:hover{background:#f6f1e8}
.chip:hover{filter:brightness(.96);transform:translateY(-1px)}
.findme:hover{filter:brightness(1.06)}
.closeb:hover{background:#f6f1e8;color:#5b5347}
</style>
</head>
<body>
<script type="text/gedcom" id="ged-data"></script>
<div id="root"></div>
<script>
"use strict";
(function(){
// ---------- palette ----------
var PAL = { PAT:'#b0876a', PAT_SOFT:'#f0e8df', MAT:'#84a096', MAT_SOFT:'#e7efeb', SELF:'#b1944c', SELF_SOFT:'#f1ead6', LINE:'#d3c8b7' };

var App = {
  PAT:PAL.PAT, PAT_SOFT:PAL.PAT_SOFT, MAT:PAL.MAT, MAT_SOFT:PAL.MAT_SOFT, SELF:PAL.SELF, SELF_SOFT:PAL.SELF_SOFT, LINE:PAL.LINE,
  _showSib:true,
  selected:null,
  drawn:false,
  legendOpen:false,
  view:{x:0,y:0,s:0.85},
  pointers:new Map(),

  _loadGed:function(){
    // 1) use embedded GEDCOM if this is a baked standalone file; 2) otherwise fetch the .ged next to the page (GitHub Pages / local server)
    var inline = document.getElementById('ged-data');
    var t = inline ? inline.textContent : '';
    if (t && t.replace(/\s/g, '').length > 50) return Promise.resolve(t);
    var src = (inline && inline.getAttribute('data-src')) || 'fedorovka_family.ged';
    return fetch(src, { cache: 'no-cache' }).then(function(r){ if (!r.ok) throw new Error('HTTP ' + r.status + ' при загрузке ' + src); return r.text(); });
  },

  _parse:function(text){
    var indi = {}, fam = {};
    var cur = null, curType = null, sub = null;
    var lines = text.split(/\r?\n/);
    for (var li=0; li<lines.length; li++){
      var raw = lines[li];
      if (!raw.trim()) continue;
      var parts = raw.split(' ');
      var level = +parts[0];
      var xref = null, tag, value;
      if (parts[1] && parts[1][0] === '@' && parts[1].slice(-1) === '@') { xref = parts[1]; tag = parts[2]; value = parts.slice(3).join(' ') || null; }
      else { tag = parts[1]; value = parts.slice(2).join(' ') || null; }
      if (level === 0) {
        sub = null;
        if (tag === 'INDI') { cur = indi[xref] = { id: xref, notes: [], sources: [], fams: [], famc: null }; curType = 'I'; }
        else if (tag === 'FAM') { cur = fam[xref] = { id: xref, chil: [], notes: [] }; curType = 'F'; }
        else { cur = null; curType = null; }
      } else if (level === 1) {
        sub = null;
        if (curType === 'I') {
          switch (tag) {
            case 'NAME': cur.name = value; break;
            case 'SEX': cur.sex = value; break;
            case 'OCCU': cur.occu = value; break;
            case 'NOTE': cur.notes.push(value); break;
            case 'SOUR': cur.sources.push(value); break;
            case 'FAMC': cur.famc = value; break;
            case 'FAMS': cur.fams.push(value); break;
            case 'BIRT': cur.birt = {}; sub = cur.birt; break;
            case 'DEAT': cur.deat = {}; sub = cur.deat; break;
            case 'BURI': cur.buri = {}; sub = cur.buri; break;
            case 'RESI': cur.resi = {}; sub = cur.resi; break;
          }
        } else if (curType === 'F') {
          if (tag === 'HUSB') cur.husb = value;
          else if (tag === 'WIFE') cur.wife = value;
          else if (tag === 'CHIL') cur.chil.push(value);
          else if (tag === 'NOTE') cur.notes.push(value);
        }
      } else if (level === 2) {
        if (sub) {
          if (tag === 'DATE') sub.date = value;
          else if (tag === 'PLAC') sub.plac = value;
          else if (tag === 'TYPE') sub.type = value;
        } else if (curType === 'I') {
          if (tag === 'SURN') cur.surn = value;
          else if (tag === 'GIVN') cur.givn = value;
        }
      }
    }
    this.indi = indi; this.fam = fam;
  },

  _relations:function(){
    var rel = {}, indi = this.indi, fam = this.fam;
    var walk = function(id, side, depth){
      var p = indi[id]; if (!p) return;
      rel[id] = { side: side, depth: depth };
      var f = p.famc && fam[p.famc];
      if (f) { if (f.husb) walk(f.husb, side, depth + 1); if (f.wife) walk(f.wife, side, depth + 1); }
    };
    var f1 = fam[indi['@I1@'].famc];
    if (f1) { if (f1.husb) walk(f1.husb, 'paternal', 1); if (f1.wife) walk(f1.wife, 'maternal', 1); }
    this.rel = rel;
  },

  _build:function(){
    var indi = this.indi, fam = this.fam;
    this._relations();
    var rel = this.rel;
    var COL = 300, ROWGAP = 142, PAD = 90, CW = 222, CH = 104;
    this.CW = CW; this.CH = CH;
    var nodeById = {};
    var leaf = 0, maxGen = 0;
    var place = function(id, gen){
      if (nodeById[id]) return nodeById[id].slot;
      var p = indi[id]; var node = { id: id, gen: gen }; nodeById[id] = node;
      if (gen > maxGen) maxGen = gen;
      var f = p && p.famc ? fam[p.famc] : null;
      var ps = [];
      if (f) { if (f.husb && indi[f.husb]) ps.push(f.husb); if (f.wife && indi[f.wife]) ps.push(f.wife); }
      if (ps.length === 0) node.slot = leaf++;
      else { var ss = ps.map(function(pid){ return place(pid, gen + 1); }); node.slot = ss.reduce(function(a, b){ return a + b; }, 0) / ss.length; }
      return node.slot;
    };
    place('@I1@', 0);

    var sideById = {};
    Object.keys(rel).forEach(function(id){ sideById[id] = rel[id].side; });
    sideById['@I1@'] = 'self';
    this.siblingIds = new Set();
    var self = this;

    if (this._showSib) {
      var colOcc = {};
      Object.values(nodeById).forEach(function(n){ (colOcc[n.gen] = colOcc[n.gen] || []).push(n.slot); });
      Object.values(fam).forEach(function(f){
        var bb = f.chil.find(function(c){ return nodeById[c]; }); if (!bb) return;
        var fsSide = (rel[bb] && rel[bb].side) || sideById[bb] || 'self';
        var gen = nodeById[bb].gen, base = nodeById[bb].slot;
        f.chil.forEach(function(c){
          if (c === bb || !indi[c] || nodeById[c]) return;
          var occ = colOcc[gen] = colOcc[gen] || [];
          var slot = null;
          for (var k = 1; k < 80 && slot === null; k++)
            for (var ci=0; ci<2; ci++){
              var cand = ci===0 ? base + k : base - k;
              if (!occ.some(function(o){ return Math.abs(o - cand) < 0.92; })) { slot = cand; break; }
            }
          if (slot === null) slot = base + occ.length + 1;
          occ.push(slot);
          nodeById[c] = { id: c, gen: gen, slot: slot, isSibling: true };
          self.siblingIds.add(c);
          sideById[c] = fsSide;
        });
      });
    }
    Object.values(fam).forEach(function(f){
      var s = (f.husb && sideById[f.husb]) || (f.wife && sideById[f.wife]) || null;
      if (s) { if (f.husb && !sideById[f.husb]) sideById[f.husb] = s; if (f.wife && !sideById[f.wife]) sideById[f.wife] = s; }
    });
    this.sideById = sideById;

    var slots = Object.values(nodeById).map(function(n){ return n.slot; });
    var minS = Math.min.apply(null, slots), maxS = Math.max.apply(null, slots);
    Object.values(nodeById).forEach(function(n){ n.x = n.gen * COL + PAD; n.y = (n.slot - minS) * ROWGAP + PAD; });
    this.WW = maxGen * COL + CW + PAD * 2;
    this.WH = (maxS - minS) * ROWGAP + CH + PAD * 2;
    this.generations = maxGen + 1;
    this.nodeById = nodeById;

    var PAT=this.PAT,PAT_SOFT=this.PAT_SOFT,MAT=this.MAT,MAT_SOFT=this.MAT_SOFT,SELF=this.SELF,SELF_SOFT=this.SELF_SOFT;
    var cOf = function(side){ return side === 'paternal' ? PAT : side === 'maternal' ? MAT : SELF; };
    var sOf = function(side){ return side === 'paternal' ? PAT_SOFT : side === 'maternal' ? MAT_SOFT : SELF_SOFT; };

    this.staticNodes = Object.values(nodeById).map(function(n){
      var p = indi[n.id]; var side = sideById[n.id] || 'self';
      var np = self.nameParts(p);
      var main = np.main, sub = np.sub, mono = np.mono;
      var relation;
      if (n.id === '@I1@') relation = 'Это вы';
      else if (rel[n.id]) relation = self.relAnc(rel[n.id].depth, p.sex, rel[n.id].side);
      else if (n.isSibling) relation = p.sex === 'F' ? 'Сестра' : 'Брат';
      else relation = '';
      var conf = self.confOf(p);
      return { id: n.id, gen: n.gen, x: n.x, y: n.y, accent: cOf(side), soft: sOf(side), main: main, sub: sub, mono: mono, relation: relation, lifespan: self.lifespan(p), confLetter: conf.letter, confShade: conf.shade, mil: self.isMil(p), deceased: !!(p.deat && (p.deat.date || p.deat.type)), delay: (n.gen * 0.08 + 0.15) + 's' };
    });

    var links = [];
    var path = function(x1, y1, x2, y2){ var mx = (x1 + x2) / 2; return 'M' + x1.toFixed(1) + ',' + y1.toFixed(1) + ' C' + mx.toFixed(1) + ',' + y1.toFixed(1) + ' ' + mx.toFixed(1) + ',' + y2.toFixed(1) + ' ' + x2.toFixed(1) + ',' + y2.toFixed(1); };
    Object.values(fam).forEach(function(f){
      var parents = [f.husb, f.wife].filter(function(pid){ return pid && nodeById[pid]; });
      var children = f.chil.filter(function(cid){ return nodeById[cid]; });
      if (!parents.length || !children.length) return;
      var side = (children.map(function(c){ return rel[c]; }).find(Boolean) || {}).side || sideById[parents[0]] || 'self';
      var color = cOf(side);
      var Jx = nodeById[parents[0]].x - 30;
      var Jy = parents.reduce(function(a, pid){ return a + nodeById[pid].y + CH / 2; }, 0) / parents.length;
      var gen = nodeById[children[0]].gen;
      parents.forEach(function(pid){ var pn = nodeById[pid]; links.push({ d: path(Jx, Jy, pn.x, pn.y + CH / 2), color: color, sib: false, gen: gen }); });
      children.forEach(function(cid){ var cn = nodeById[cid]; links.push({ d: path(cn.x + CW, cn.y + CH / 2, Jx, Jy), color: color, sib: !!cn.isSibling, gen: gen }); });
    });
    this.staticLinks = links.map(function(l){ return { d: l.d, color: l.color, sib: l.sib, delay: (l.gen * 0.09 + 0.5) + 's' }; });
  },

  relAnc:function(depth, sex, side){
    var suf = side === 'paternal' ? ' по папе' : side === 'maternal' ? ' по маме' : '';
    if (depth === 1) return sex === 'F' ? 'Мама' : 'Папа';
    if (depth === 2) return (sex === 'F' ? 'Бабушка' : 'Дедушка') + suf;
    var c = depth - 2;                       // число «пра»
    var base = sex === 'F' ? 'бабушка' : 'дед';
    // до прапрапра… (3 «пра») — словом; глубже — компактно: «Пра⁶-дед»
    if (c <= 3) { var w = 'пра'.repeat(c) + base; return w.charAt(0).toUpperCase() + w.slice(1) + suf; }
    var sup = '⁰¹²³⁴⁵⁶⁷⁸⁹';
    var s = ('' + c).replace(/\d/g, function(d){ return sup.charAt(+d); });
    return 'Пра' + s + '-' + base + suf;
  },
  confOf:function(p){
    var m = (p.notes || []).map(function(n){ return n.match(/\[ТОЧНОСТЬ\s+([ABC])\]/); }).find(Boolean);
    var letter = m ? m[1] : null;
    var map = { A: { shade: '#5b5347', label: 'Архивно подтверждено' }, B: { shade: '#9a9082', label: 'Вероятно · частично' }, C: { shade: '#bdb4a5', label: 'Мало данных · тупик' } };
    return { letter: letter || '?', shade: letter ? map[letter].shade : '#bdb4a5', label: letter ? map[letter].label : 'Без оценки' };
  },
  isMil:function(p){
    var occu = p.occu || '', txt = (p.notes || []).join(' ');
    return /сержант|рядов|красноарм|старшина|кавалер|телефонист|стрелков|дивизи|гвард/i.test(occu) || /«За отвагу»|За боевые заслуги|Орден|подвиг|Пропал без вести|РВК|фронт|плен/i.test(txt) || !!(p.deat && p.deat.type);
  },
  // фамилия проставлена ретроспективно / дофамильный период → на карточке показываем имя+отчество, без фамилии-плашки
  isRetroSurn:function(p){
    return (p.notes || []).some(function(n){ return /\[ФАМИЛИЯ\s+РЕТРО\]|дофамильн|проставлен[аоы]?\s+ретроспективн|ретроспективн[ао]\s+по\s+селу|фамилии\s+ещё\s+нет/i.test(n); });
  },
  // {main, sub, mono} с учётом ретро-фамилии
  nameParts:function(p){
    var surn = p.surn || '', givn = p.givn || '';
    if (this.isRetroSurn(p)) {
      var main = givn || (p.name ? p.name.replace(/\//g, '').trim() : 'Неизвестно');
      var w = main.split(/\s+/);
      return { main: main, sub: '', mono: ((w[0] || '?')[0] + (w[1] ? w[1][0] : '')).toUpperCase(), retroSurn: surn };
    }
    var m = surn || givn || 'Неизвестно';
    return { main: m, sub: surn ? givn : '', mono: ((surn ? surn[0] : '') + (givn ? givn[0] : '') || (m[0] || '?')).toUpperCase(), retroSurn: '' };
  },
  yr:function(d){ if (!d) return null; var m = ('' + d).match(/(\d{4})/); return m ? m[1] : null; },
  lifespan:function(p){
    var by = this.yr(p.birt && p.birt.date), dy = this.yr(p.deat && p.deat.date);
    var abt = p.birt && p.birt.date && /^ABT/i.test(p.birt.date);
    if (by && dy) return (abt ? '≈' : '') + by + ' – ' + dy;
    if (by) return (abt ? '≈ ' : 'р. ') + by;
    if (dy) return '† ' + dy;
    if (p.deat && p.deat.type) return p.deat.type;
    return '—';
  },
  fmtDate:function(d){
    if (!d) return null;
    var s = ('' + d).trim(), pre = '';
    if (/^ABT/i.test(s)) { pre = 'около '; s = s.replace(/^ABT\s*/i, ''); }
    var MG = { JAN: 'января', FEB: 'февраля', MAR: 'марта', APR: 'апреля', MAY: 'мая', JUN: 'июня', JUL: 'июля', AUG: 'августа', SEP: 'сентября', OCT: 'октября', NOV: 'ноября', DEC: 'декабря' };
    var MN = { JAN: 'январь', FEB: 'февраль', MAR: 'март', APR: 'апрель', MAY: 'май', JUN: 'июнь', JUL: 'июль', AUG: 'август', SEP: 'сентябрь', OCT: 'октябрь', NOV: 'ноябрь', DEC: 'декабрь' };
    var t = s.split(/\s+/); var out = s;
    if (t.length === 3) out = (+t[0]) + ' ' + (MG[t[1].toUpperCase()] || t[1]) + ' ' + t[2];
    else if (t.length === 2) out = (MN[t[0].toUpperCase()] || t[0]) + ' ' + t[1];
    return pre + out;
  },
  relationFor:function(id, p, side){
    if (this.rel[id]) return this.relAnc(this.rel[id].depth, p.sex, this.rel[id].side);
    if (this.siblingIds.has(id)) return p.sex === 'F' ? 'Сестра' : 'Брат';
    var pn = (p.notes || []).filter(function(n){ return !/^\s*\[/.test(n); })[0];
    if (pn) { var t = pn.split('.')[0].trim(); if (t.length && t.length < 64) return t; }
    return p.sex === 'F' ? 'Родственница' : 'Родственник';
  },

  buildDetail:function(id){
    var self = this;
    var p = this.indi[id]; if (!p) return null;
    var side = this.sideById[id] || 'self';
    var PAT=this.PAT,PAT_SOFT=this.PAT_SOFT,MAT=this.MAT,MAT_SOFT=this.MAT_SOFT,SELF=this.SELF,SELF_SOFT=this.SELF_SOFT;
    var cOf = function(s){ return s === 'paternal' ? PAT : s === 'maternal' ? MAT : SELF; };
    var sOf = function(s){ return s === 'paternal' ? PAT_SOFT : s === 'maternal' ? MAT_SOFT : SELF_SOFT; };
    var np = this.nameParts(p);
    var main = np.main, sub = np.sub, mono = np.mono;
    var relation = id === '@I1@' ? 'Это вы · точка отсчёта' : this.relationFor(id, p, side);
    var sideLabel = side === 'paternal' ? 'Линия отца' : side === 'maternal' ? 'Линия матери' : 'Точка отсчёта';
    var notes = p.notes || [];
    var methodology = (notes.map(function(n){ var m = n.match(/^\s*\[ТОЧНОСТЬ\s+[ABC]\]\s*(.*)$/); return m ? m[1] : null; }).find(Boolean)) || null;
    var plain = notes.filter(function(n){ return !/^\s*\[/.test(n); });
    var archival = notes.filter(function(n){ return /^\s*\[ПН/.test(n); }).map(function(n){ var m = n.match(/^\s*\[ПН\s*([0-9.]+)?([^\]]*)\]\s*([\s\S]*)$/); return { date: (m && m[1]) || null, body: (m && m[3]) || n.replace(/^\s*\[[^\]]*\]\s*/, '') }; });
    var sources = [];
    (p.sources || []).forEach(function(s){ s.split(/\s*;\s*/).forEach(function(t){ t = t.trim().replace(/^pamyat-naroda\.ru\s*[—-]\s*/i, ''); if (t) sources.push(t); }); });
    var facts = [];
    if (np.retroSurn) facts.push({ label: 'Фамилия', value: '«' + np.retroSurn + '» — ретроспективная, по селу; в эту эпоху фамилий ещё не было' });
    if (p.birt && (p.birt.date || p.birt.plac)) facts.push({ label: 'Рождение', value: [this.fmtDate(p.birt.date), p.birt.plac].filter(Boolean).join('  ·  ') });
    if (p.deat && (p.deat.date || p.deat.plac || p.deat.type)) facts.push({ label: 'Смерть', value: [p.deat.type, this.fmtDate(p.deat.date), p.deat.plac].filter(Boolean).join('  ·  ') });
    if (p.buri && p.buri.plac) facts.push({ label: 'Захоронение', value: p.buri.plac });
    if (p.occu) facts.push({ label: 'Служба / занятие', value: p.occu });
    if (p.resi && p.resi.plac && (!p.birt || p.resi.plac !== p.birt.plac)) facts.push({ label: 'Место жительства', value: p.resi.plac });
    var nm = function(rid){ var q = self.indi[rid]; if (!q) return rid; var qp = self.nameParts(q); return [qp.main, qp.sub].filter(Boolean).join(' ') || 'Неизвестно'; };
    var chip = function(rid){ return { name: nm(rid), id: rid }; };
    var fc = p.famc ? this.fam[p.famc] : null;
    var parents = fc ? [fc.husb, fc.wife].filter(Boolean).map(chip) : [];
    var siblings = fc ? fc.chil.filter(function(c){ return c !== id; }).map(chip) : [];
    var spouses = [], children = [];
    (p.fams || []).forEach(function(fid){ var f = self.fam[fid]; if (!f) return; [f.husb, f.wife].forEach(function(x){ if (x && x !== id) spouses.push(chip(x)); }); (f.chil || []).forEach(function(c){ children.push(chip(c)); }); });
    var groups = [['Родители', parents], ['Супруг(а)', spouses], ['Дети', children], ['Братья и сёстры', siblings]].filter(function(g){ return g[1].length; }).map(function(g){ return { title: g[0], items: g[1] }; });
    return { accent: cOf(side), soft: sOf(side), main: main, sub: sub, mono: mono, relation: relation, sideLabel: sideLabel, lifespan: this.lifespan(p), conf: this.confOf(p), methodology: methodology, notes: plain, archival: archival, hasArchival: archival.length > 0, sources: sources, hasSources: sources.length > 0, facts: facts, groups: groups };
  },

  // ---------- DOM helpers ----------
  el:function(tag, style, props){
    var e = document.createElement(tag);
    if (style) e.setAttribute('style', style);
    if (props) for (var k in props){ if (k === 'text') e.textContent = props[k]; else if (k === 'html') e.innerHTML = props[k]; else e.setAttribute(k, props[k]); }
    return e;
  },

  onMove:function(e){
    if (!this.pointers.has(e.pointerId)) return;
    this.pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
    if (this.pointers.size >= 2) { this.moved = true; this._doPinch(); return; }
    if (!this.drag) return;
    var dx = e.clientX - this.st.x, dy = e.clientY - this.st.y;
    if (Math.abs(dx) + Math.abs(dy) > 4) this.moved = true;
    this.view.x = this.st.vx + dx; this.view.y = this.st.vy + dy; this.apply(false);
  },
  onUp:function(e){
    this.pointers.delete(e.pointerId);
    if (this.pointers.size < 2) this._pinch = null;
    if (this.pointers.size === 1) { var p = Array.from(this.pointers.values())[0]; this.drag = true; this.st = { x: p.x, y: p.y, vx: this.view.x, vy: this.view.y }; }
    if (this.pointers.size === 0) { this.drag = false; if (this.vp) this.vp.style.cursor = 'grab'; }
  },
  _two:function(){ var a = Array.from(this.pointers.values()); return [a[0], a[1]]; },
  _startPinch:function(){
    var r = this._rect(), t = this._two(), a = t[0], b = t[1];
    var mx = (a.x + b.x) / 2 - r.left, my = (a.y + b.y) / 2 - r.top;
    this._pinch = { dist: Math.hypot(a.x - b.x, a.y - b.y), wx: (mx - this.view.x) / this.view.s, wy: (my - this.view.y) / this.view.s, s: this.view.s };
  },
  _doPinch:function(){
    if (!this._pinch) { this._startPinch(); return; }
    var r = this._rect(), t = this._two(), a = t[0], b = t[1];
    var mx = (a.x + b.x) / 2 - r.left, my = (a.y + b.y) / 2 - r.top;
    var ns = Math.min(2.4, Math.max(0.18, this._pinch.s * Math.hypot(a.x - b.x, a.y - b.y) / this._pinch.dist));
    this.view.s = ns; this.view.x = mx - this._pinch.wx * ns; this.view.y = my - this._pinch.wy * ns; this.apply(false);
  },
  zoom:function(f){ var r = this._rect(), cx = r.width / 2, cy = r.height / 2, old = this.view.s, ns = Math.min(2.4, Math.max(0.22, old * f)); this.view.x = cx - (cx - this.view.x) * (ns / old); this.view.y = cy - (cy - this.view.y) * (ns / old); this.view.s = ns; this.apply(true); },
  fit:function(){ var r = this._rect(), pad = this._mobile() ? 0.95 : 0.9, s = Math.min(r.width / this.WW, r.height / this.WH) * pad; this.view.s = s; this.view.x = (r.width - this.WW * s) / 2; this.view.y = (r.height - this.WH * s) / 2; this.apply(true); },
  focus:function(id, scale, posX){ var n = this.nodeById[id]; if (!n || !this.vp) return; var r = this._rect(), s = scale || Math.max(this.view.s, 0.8); this.view.s = s; this.view.x = r.width * (posX != null ? posX : 0.42) - n.x * s; this.view.y = r.height * 0.5 - (n.y + this.CH / 2) * s; this.apply(true); },
  cardClick:function(id){ if (this.moved) return; this.selected = id; this.renderDrawer(); },
  goTo:function(id){ this.selected = id; this.renderDrawer(); if (!this._mobile()) this.focus(id, Math.max((this.view && this.view.s) || 0.85, 0.8), 0.42); },
  close:function(){ this.selected = null; this.renderDrawer(); },

  init:function(){
    var self = this;
    var root = document.getElementById('root');
    root.setAttribute('style', 'position:fixed;inset:0;display:flex;align-items:center;justify-content:center;font-family:Manrope,system-ui,sans-serif;color:#a08f5f;font-size:14px');
    root.textContent = 'Загрузка древа…';
    this._loadGed().then(function(text){
      self._parse(text);
      self.personCount = Object.keys(self.indi).length;
      if (!self.indi['@I1@']) throw new Error('в GEDCOM не найдена отправная персона @I1@');
      self._build();
      self.render();
      var go = function(){
        if (!self.vp || !self.vp.clientWidth) { requestAnimationFrame(go); return; }
        if (self._mobile()) self.focus('@I1@', 0.72, 0.5); else self.focus('@I1@', 0.92, 0.18);
        if (!self.drawn){ self.drawn = true; self.linkEls.forEach(function(p){ p.style.strokeDashoffset = 0; }); }
      };
      setTimeout(function(){ requestAnimationFrame(go); }, 60);
    }).catch(function(e){
      root.setAttribute('style', 'position:fixed;inset:0;display:flex;align-items:center;justify-content:center;padding:40px;text-align:center;font-family:Manrope,system-ui,sans-serif;color:#8a4b4b;font-size:14px;line-height:1.6');
      root.textContent = 'Не удалось загрузить данные древа: ' + e.message + '. Если вы открыли файл напрямую (file://), запустите локальный сервер или используйте автономную версию.';
    });
  }
};

if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', function(){ App.init(); });
else App.init();
})();
</script>
